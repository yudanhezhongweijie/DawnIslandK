name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The Gradle wrapper is gitignored in this repo, so install Gradle
      # directly. AGP 8.0.1 requires Gradle 8.0+.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0.2'

      - name: Decode signing keystore
        run: printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      # Only KEYSTORE_B64 and KEYSTORE_PASSWORD are required. KEY_ALIAS defaults
      # to "key0" and KEY_PASSWORD falls back to KEYSTORE_PASSWORD (see
      # app/build.gradle); set them only if the keystore differs.
      - name: Build release APK
        run: gradle assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "K_${GITHUB_REF_NAME}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: K_*.apk

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: K_*.apk
